name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Verify installation
        run: flutter doctor -v

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update pubspec version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUILD_NUMBER=$(echo "$VERSION" | tr -d '.' | sed 's/^0*//')
          sed -i "s/^version:.*/version: ${VERSION}+${BUILD_NUMBER}/" pubspec.yaml
          cat pubspec.yaml | head -5

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.jks
          cat > android/key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=release
          storeFile=release.jks
          EOF

      - name: Build Android APK
        run: flutter build apk --release

      - name: Build Web
        run: flutter build web --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: ./artifacts/

      - name: Download Web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: ./artifacts/web/

      - name: Zip Web build
        run: |
          cd ./artifacts
          zip -r octopus-manager-web.zip web/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Octopus Manager ${{ github.ref_name }}
          body: |
            ## Octopus Manager ${{ github.ref_name }}

            ### Downloads
            - **Android**: `octopus-manager-android.apk`
            - **Web**: `octopus-manager-web.zip`

            ### What's New
            - Initial release
            - Login with remember me support
            - Bootstrap initial admin account setup
            - Dashboard with real-time stats
            - Channel, Group, API Key management
            - Relay logs
            - Server settings
            - English & Chinese i18n
          draft: false
          prerelease: false
          files: |
            ./artifacts/app-release.apk
            ./artifacts/octopus-manager-web.zip
